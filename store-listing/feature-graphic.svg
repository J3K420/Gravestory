<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0e0b08"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <linearGradient id="stoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3028"/>
      <stop offset="100%" stop-color="#1f1812"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="0" x2="1024" y2="500" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.06"/>
  <line x1="1024" y1="0" x2="0" y2="500" stroke="#c9a84c" stroke-width="0.3" stroke-opacity="0.06"/>

  <!-- Gold border frame -->
  <rect x="20" y="20" width="984" height="460" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.35"/>
  <rect x="26" y="26" width="972" height="448" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Corner ornaments -->
  <g stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5" fill="none">
    <path d="M30 50 L30 30 L50 30"/>
    <path d="M974 50 L974 30 L954 30"/>
    <path d="M30 450 L30 470 L50 470"/>
    <path d="M974 450 L974 470 L954 470"/>
  </g>

  <!-- Gravestone silhouette (left side) -->
  <g transform="translate(155, 60)">
    <!-- Stone body with arch top -->
    <path d="M0,80 Q0,0 60,0 Q120,0 120,80 L120,280 Q120,295 105,295 L15,295 Q0,295 0,280 Z"
          fill="url(#stoneGrad)" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Stone base -->
    <rect x="-15" y="290" width="150" height="18" rx="3"
          fill="#2a2017" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Cross on stone -->
    <rect x="52" y="40" width="16" height="80" rx="3" fill="#c9a84c" fill-opacity="0.25"/>
    <rect x="30" y="70" width="60" height="16" rx="3" fill="#c9a84c" fill-opacity="0.25"/>
    <!-- Open book on stone -->
    <path d="M25,200 Q60,185 60,190 Q60,185 95,200 L95,240 Q60,225 60,230 Q60,225 25,240 Z"
          fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="60" y1="190" x2="60" y2="240" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <!-- Lines of text on book -->
    <line x1="32" y1="210" x2="56" y2="204" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>
    <line x1="32" y1="218" x2="56" y2="212" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="32" y1="226" x2="56" y2="220" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.25"/>
    <line x1="64" y1="204" x2="88" y2="210" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.35"/>
    <line x1="64" y1="212" x2="88" y2="218" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>
    <line x1="64" y1="220" x2="88" y2="226" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.25"/>
  </g>

  <!-- Candle (right of stone) -->
  <g transform="translate(305, 220)">
    <rect x="0" y="0" width="14" height="60" rx="2" fill="#2a2017" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>
    <!-- Flame -->
    <path d="M7,-2 Q14,8 10,18 Q7,22 4,18 Q0,8 7,-2 Z" fill="#f2b65c" fill-opacity="0.85" filter="url(#glow)"/>
    <path d="M7,2 Q11,9 9,16 Q7,19 5,16 Q3,9 7,2 Z" fill="#fff8ee" fill-opacity="0.7"/>
  </g>

  <!-- Divider line -->
  <line x1="370" y1="80" x2="370" y2="420" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- App name — right side -->
  <text x="700" y="175" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="400" letter-spacing="6"
        fill="url(#goldGlow)" filter="url(#softGlow)">GraveStory</text>

  <!-- Tagline -->
  <text x="700" y="220" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="400" letter-spacing="2"
        fill="#e8d4a0" fill-opacity="0.75">Every stone has a story to tell.</text>

  <!-- Thin divider under tagline -->
  <line x1="510" y1="242" x2="890" y2="242" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Feature bullets -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="17" fill="#b7a892" fill-opacity="0.85">
    <text x="530" y="284">✦  AI-generated biographies from real sources</text>
    <text x="530" y="316">✦  Genealogy records, historical newspapers</text>
    <text x="530" y="348">✦  GPS-linked cemetery maps</text>
    <text x="530" y="380">✦  Community global map</text>
  </g>

  <!-- Bottom gold rule -->
  <line x1="510" y1="408" x2="890" y2="408" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Subtle stars/sparkles -->
  <g fill="#c9a84c" fill-opacity="0.3">
    <circle cx="440" cy="100" r="1.5"/>
    <circle cx="960" cy="140" r="1.5"/>
    <circle cx="420" cy="390" r="1"/>
    <circle cx="950" cy="420" r="1"/>
    <circle cx="470" cy="450" r="1.5"/>
  </g>
</svg>
